# Render.com deployment
services:
  - type: web
    name: graphmind-ai
    runtime: docker
    dockerfilePath: ./Dockerfile
    envVars:
      - key: GROQ_API_KEY
        sync: false
      - key: GROQ_MODEL
        value: llama-3.3-70b-versatile
      - key: GROQ_BASE_URL
        value: https://api.groq.com/openai/v1
      - key: CORS_ORIGINS
        value: "*"
