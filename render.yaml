# Render.com deployment — Backend API only
# Frontend is deployed separately on Vercel
services:
  - type: web
    name: graphmind-ai-api
    runtime: docker
    dockerfilePath: ./Dockerfile
    plan: free
    healthCheckPath: /api/health
    envVars:
      - key: GROQ_API_KEY
        sync: false
      - key: GROQ_MODEL
        value: llama-3.3-70b-versatile
      - key: GROQ_BASE_URL
        value: https://api.groq.com/openai/v1
      - key: CORS_ORIGINS
        value: https://graphmind-ai-sigma.vercel.app,https://graphmind-ai.vercel.app
